/**:
  ros__parameters:
    # Input topic names
    odom_topic: '/rb2/odom'
    
    # Trilateration measurement topics (relative positions)
    trilat_topic_other1: '/rb2/tri_pos_in_rb1'  # Position of rb1 in rb2's frame
    trilat_topic_other2: '/rb2/tri_pos_in_rb3'  # Position of rb3 in rb2's frame
    
    # Output topic
    output_topic: '/rb2/ukf_pose'
    
    # Update rate (Hz)
    update_rate: 20.0
    
    # Odometry measurement noise (standard deviations)
    odom_pos_noise: 0.01        # Position measurement noise (meters)
    odom_ang_noise: 0.001       # Angle measurement noise (radians)
    
    # Trilateration measurement noise
    trilat_noise: 0.15        # (0.15m)^2 for trilateration distance
    
    # Process noise (uncertainty in motion model)
    process_noise_pos: 0.15     # Position uncertainty
    process_noise_ang: 0.02    # Angle uncertainty

