/**:
  ros__parameters:
    # Input topic names
    odom_topic: '/rb1/odom'
    
    # Trilateration measurement topics (relative positions)
    # /rb1/tri_pos_in_rbX: position of rbX in rb1's local frame
    trilat_topic_other1: '/rb1/tri_pos_in_rb2'  # Position of rb2 in rb1's frame
    trilat_topic_other2: '/rb1/tri_pos_in_rb3'  # Position of rb3 in rb1's frame
    
    # Output topic
    output_topic: '/rb1/ukf_pose'
    
    # Update rate (Hz)
    update_rate: 20.0
    
    # Odometry measurement noise (standard deviations)
    odom_pos_noise: 0.01        # Position measurement noise (meters)
    odom_ang_noise: 0.001       # Angle measurement noise (radians)
    
    # Trilateration measurement noise
    trilat_noise: 0.0225        # (0.15m)^2 for trilateration distance
    
    # Process noise (uncertainty in motion model)
    process_noise_pos: 0.01     # Position uncertainty
    process_noise_ang: 0.001    # Angle uncertainty
